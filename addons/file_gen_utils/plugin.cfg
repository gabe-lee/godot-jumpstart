[plugin]

name="FileGenUtils"
description="A collection of utility scripts that can be used to do a number of useful development actions:
+ Create a procedurally generated gdscript/text-file
  - Create a custom binary file format that is automatically serialized and automatically mirgates from older versions
+ Procedurally insert/append/overwrite code to only specific part of an existing file/script without touching the rest of the data
  - Generate an automatic finite-state-machine somewhere in your existing code (or as part of a full generated script)
  - Generate enum lookup table(s) from a dictionary of constant properties (turns a dictionary into a set of separate arrays for each property, accesed by enum int instead of dict key)
  - Generate a psuedo-multi-level array that is accesssed by a series of enum keys from a series of nested dictionaries (see TranslationTable example)
+ Like, probably anything else you would want to do in regards to code generation if you want to put in some manual effort...

Includes:
+ BinaryFile:
	A script that wraps FileAccess an provides a multitude of utility methods for serializing binary data
+ StringBuilder:
	A class that can build a large string procedurally
+ TextFile:
	The FileAccess version of StringBuilder, immediately writes parts to the open file
+ Result:
	A helper class that acts as a more robust container that returns a 'value and/or error' and can automatically dispatch error handling via static methods (that you can override with your own handlers)
+ ScriptBuilder (EDITOR_ONLY):
	A base class that can procedurally generate a gdscript file using gdscript-like syntax functions (or simple raw lines)
+ ScriptFragmentBuilder (EDITOR_ONLY):
	A base class that can procedurally generate a FRAGMENT of a gdscript file using gdscript-like syntax functions (or simple raw lines)
+ ScriptFileBuilder (EDITOR_ONLY):
	A complex wrapper around StringBuilder that acts as the core for ScriptBuilder and FileFormatBuilder
+ FileFormatBuilder (EDITOR_ONLY):
	A class that extends ScriptBuilder, and is used to generate a binary file format (or ConfigFile format) for your game, with options to allow automatic serialization and version migration". Can also optionally generate without serialization code and be inserted as a code fragment in existing scripts
+ FatEntitySystemBuilder (EDITOR_ONLY):
	A class that extends FileFormatBuilder to add an (optionally serialized and version-tracked) 'fat entity system' (every entity has every defined property, properties are stored in separate arrays). Can be attatched to a serialized file format, or generated standalone and inserted as a code fragment in existing scripts
+ TypeUtil (EDITOR_ONLY):
	An internal helper for FileFormatBuilder

See the 'EDITOR_ONLY/examples' folder for examples
author="Gabe-Lee"
version="0.5"
script="file_gen_utils.gd"
